<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV – Amogh Vinaykumar</title>

  <style>
    :root {
      --bg:           #ffffff;
      --bg-nav:       rgba(255, 255, 255, 0.96);
      --text:         #212121;
      --text-muted:   #757575;
      --link:         #7e57c2;
      --link-hover:   #5e35b1;
      --nav-active:   #212121;
      --nav-inactive: #9e9e9e;
      --border:       #e0e0e0;
      --toggle-bg:    #f5f5f5;
    }

    [data-theme="dark"] {
      --bg:           #1c1c1e;
      --bg-nav:       rgba(28, 28, 30, 0.96);
      --text:         #e1e1e6;
      --text-muted:   #a0a0ab;
      --link:         #b39ddb;
      --link-hover:   #ce93d8;
      --nav-active:   #e1e1e6;
      --nav-inactive: #8e8e99;
      --border:       #2c2c2e;
      --toggle-bg:    #2c2c2e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      font-size: 16px;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--link); text-decoration: none; transition: color 0.15s; }
    a:hover { color: var(--link-hover); text-decoration: underline; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-nav);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background 0.3s, border-color 0.3s;
    }

    .nav-inner {
      max-width: 900px; margin: 0 auto;
      padding: 0 40px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .nav-links { display: flex; align-items: center; gap: 26px; }
    .nav-links a {
      font-size: 0.92rem; font-weight: 500; letter-spacing: 0.01em;
      color: var(--nav-inactive); text-decoration: none;
      transition: color 0.2s; padding-bottom: 2px;
      border-bottom: 2px solid transparent;
    }
    .nav-links a:hover { color: var(--nav-active); text-decoration: none; }
    .nav-links a.active { color: var(--nav-active); border-bottom-color: var(--link); }

    .theme-toggle {
      background: none; border: none; cursor: pointer;
      padding: 6px 8px; border-radius: 7px;
      color: var(--nav-inactive); font-size: 1rem; line-height: 1;
      transition: background 0.2s, color 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .theme-toggle:hover { background: var(--toggle-bg); color: var(--nav-active); }

    main { max-width: 900px; margin: 0 auto; padding: 70px 40px 100px; }

    .page-title {
      font-size: 2.5rem; font-weight: 700;
      letter-spacing: -0.025em; line-height: 1.1;
      margin-bottom: 60px; color: var(--text);
    }

    .coming-soon {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    @media (max-width: 660px) {
      .nav-inner { padding: 0 20px; }
      main { padding: 44px 20px 70px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-links">
      <a href="index.html">about</a>
      <a href="cv.html" class="active">cv</a>
    </div>
    <button class="theme-toggle" id="toggleBtn" onclick="toggleTheme()" aria-label="Toggle theme">
      <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</nav>

<main>
  <h1 class="page-title">cv</h1>
  <p class="coming-soon">Coming soon.</p>
</main>

<script>
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('icon-moon').style.display = theme === 'dark' ? 'none'  : 'block';
    document.getElementById('icon-sun').style.display  = theme === 'dark' ? 'block' : 'none';
  }
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next    = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('av-theme', next);
    applyTheme(next);
  }
  (function () {
    const saved   = localStorage.getItem('av-theme');
    const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    applyTheme(saved || prefers);
  })();
</script>

</body>
</html>
